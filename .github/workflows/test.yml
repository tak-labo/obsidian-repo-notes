name: Test

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build
        continue-on-error: true

      - name: Test
        id: test
        run: npm test -- --reporter=verbose 2>&1 | tee /tmp/test-output.txt
        continue-on-error: true

      - name: Lint
        id: lint
        run: npx eslint src/ --format json --output-file /tmp/lint-results.json || true
        continue-on-error: true

      - name: Write job summary
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
        run: |
          node << 'EOF'
          const fs = require("fs");

          const buildOk = process.env.BUILD_OUTCOME === "success";
          const testOk  = process.env.TEST_OUTCOME  === "success";
          const lintOk  = process.env.LINT_OUTCOME  === "success";

          const icon = (ok) => ok ? "✅" : "❌";
          const lines = [];

          // ── Header table ──────────────────────────────────────────────
          lines.push("## CI Results");
          lines.push("");
          lines.push("| | Step | Status |");
          lines.push("|---|---|---|");
          lines.push(`| 🔨 | Build | ${icon(buildOk)} ${buildOk ? "Passed" : "Failed"} |`);
          lines.push(`| 🧪 | Test  | ${icon(testOk)} ${testOk ? "Passed" : "Failed"} |`);
          lines.push(`| 🔍 | Lint  | ${icon(lintOk)} ${lintOk ? "Passed" : "Failed"} |`);
          lines.push("");

          // ── Test output ───────────────────────────────────────────────
          try {
            const testOut = fs.readFileSync("/tmp/test-output.txt", "utf8");
            const summary = testOut.match(/Tests\s+\d+[^\n]*/);
            lines.push("<details>");
            lines.push(`<summary>🧪 Test details${summary ? " — " + summary[0].trim() : ""}</summary>`);
            lines.push("");
            lines.push("```");
            lines.push(testOut.trim());
            lines.push("```");
            lines.push("</details>");
            lines.push("");
          } catch (_) {}

          // ── Lint output ───────────────────────────────────────────────
          try {
            const results = JSON.parse(fs.readFileSync("/tmp/lint-results.json", "utf8"));
            const errors = [];
            for (const file of results) {
              const rel = file.filePath.replace(process.cwd() + "/", "");
              for (const msg of file.messages) {
                errors.push({ file: rel, line: msg.line, col: msg.column, rule: msg.ruleId, message: msg.message, severity: msg.severity });
              }
            }
            if (errors.length === 0) {
              lines.push("🔍 **Lint: No issues found**");
            } else {
              lines.push(`<details open>`);
              lines.push(`<summary>🔍 Lint issues (${errors.length})</summary>`);
              lines.push("");
              lines.push("| File | Line | Rule | Message |");
              lines.push("|------|------|------|---------|");
              for (const e of errors) {
                const sev = e.severity === 2 ? "🔴" : "🟡";
                lines.push(`| \`${e.file}\` | ${e.line}:${e.col} | \`${e.rule}\` | ${sev} ${e.message} |`);
              }
              lines.push("</details>");
            }
            lines.push("");
          } catch (_) {}

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
          EOF
