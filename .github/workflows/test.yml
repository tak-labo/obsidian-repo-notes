name: Test

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build
        continue-on-error: true

      - name: Test
        id: test
        run: npm test -- --reporter=verbose 2>&1 | tee /tmp/test-output.txt
        continue-on-error: true

      - name: Lint
        id: lint
        run: npx eslint src/ --format json --output-file /tmp/lint-results.json || true
        continue-on-error: true

      - name: Format check
        id: format
        run: npx prettier --check src/ 2>&1 | tee /tmp/format-output.txt
        continue-on-error: true

      - name: Write job summary
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          FORMAT_OUTCOME: ${{ steps.format.outcome }}
        run: |
          node << 'EOF'
          const fs = require("fs");

          const buildOk  = process.env.BUILD_OUTCOME  === "success";
          const testOk   = process.env.TEST_OUTCOME   === "success";
          const lintOk   = process.env.LINT_OUTCOME   === "success";
          const formatOk = process.env.FORMAT_OUTCOME === "success";

          const icon = (ok) => ok ? "✅" : "❌";
          const lines = [];

          // ── Header table ──────────────────────────────────────────────
          lines.push("## CI Results");
          lines.push("");
          lines.push("| | Step | Status |");
          lines.push("|---|---|---|");
          lines.push(`| 🔨 | Build  | ${icon(buildOk)} ${buildOk ? "Passed" : "Failed"} |`);
          lines.push(`| 🧪 | Test   | ${icon(testOk)} ${testOk ? "Passed" : "Failed"} |`);
          lines.push(`| 🔍 | Lint   | ${icon(lintOk)} ${lintOk ? "Passed" : "Failed"} |`);
          lines.push(`| 🎨 | Format | ${icon(formatOk)} ${formatOk ? "Passed" : "Failed"} |`);
          lines.push("");

          // ── Test output ───────────────────────────────────────────────
          try {
            const testOut = fs.readFileSync("/tmp/test-output.txt", "utf8");
            const summary = testOut.match(/Tests\s+\d+[^\n]*/);
            lines.push("<details>");
            lines.push(`<summary>🧪 Test details${summary ? " — " + summary[0].trim() : ""}</summary>`);
            lines.push("");
            lines.push("```");
            lines.push(testOut.trim());
            lines.push("```");
            lines.push("</details>");
            lines.push("");
          } catch (_) {}

          // ── Lint output ───────────────────────────────────────────────
          try {
            const results = JSON.parse(fs.readFileSync("/tmp/lint-results.json", "utf8"));
            const errors = [];
            let filesChecked = 0;
            for (const file of results) {
              if (file.messages.length > 0 || file.errorCount > 0 || file.warningCount > 0) filesChecked++;
              const rel = file.filePath.replace(process.cwd() + "/", "");
              for (const msg of file.messages) {
                errors.push({ file: rel, line: msg.line, col: msg.column, rule: msg.ruleId, message: msg.message, severity: msg.severity });
              }
            }
            const totalFiles = results.length;
            lines.push(`### 🔍 Lint — ${errors.length === 0 ? "✅ No issues" : `❌ ${errors.length} issue(s)`} in ${totalFiles} files`);
            lines.push("");
            lines.push("| File | Line | Rule | Severity | Message |");
            lines.push("|------|------|------|----------|---------|");
            if (errors.length === 0) {
              lines.push("| — | — | — | — | No lint issues found |");
            } else {
              for (const e of errors) {
                const sev = e.severity === 2 ? "🔴 error" : "🟡 warning";
                lines.push(`| \`${e.file}\` | ${e.line}:${e.col} | \`${e.rule}\` | ${sev} | ${e.message} |`);
              }
            }
            lines.push("");
          } catch (_) {}

          // ── Prettier output ───────────────────────────────────────────
          try {
            const fmtOut = fs.readFileSync("/tmp/format-output.txt", "utf8").trim();
            if (!formatOk && fmtOut) {
              lines.push("### 🎨 Format issues");
              lines.push("");
              lines.push("Run `npm run format` to auto-fix.");
              lines.push("");
              lines.push("```");
              lines.push(fmtOut);
              lines.push("```");
              lines.push("");
            }
          } catch (_) {}

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
          EOF
