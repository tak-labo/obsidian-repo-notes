name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Verify manifest version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Create release zip
        run: zip repo-notes.zip main.js manifest.json styles.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: |
            main.js
            manifest.json
            styles.css
            repo-notes.zip
          generate_release_notes: true

      - name: Update CHANGELOG.md and create PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DATE=$(date +%Y-%m-%d)

          # 既にこのバージョンが存在する場合はスキップ
          if grep -q "^## $VERSION" CHANGELOG.md 2>/dev/null; then
            echo "バージョン $VERSION は既に CHANGELOG.md に存在します。スキップします。"
            exit 0
          fi

          NOTES=$(gh release view "$VERSION" --json body -q .body)

          {
            echo "# Changelog"
            echo ""
            echo "## $VERSION ($DATE)"
            echo ""
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            tail -n +2 CHANGELOG.md 2>/dev/null || true
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main

          BRANCH="chore/changelog-${VERSION}"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "CHANGELOG.mdを${VERSION}に更新"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: CHANGELOG.mdを${VERSION}に更新" \
            --body "リリース ${VERSION} のCHANGELOG.mdを自動更新します。" \
            --base main \
            --head "$BRANCH"
